name: Run Tests

on:
  pull_request:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript compilation is up to date
        run: |
          npm run tsc
          if [ -n "$(git status --porcelain)" ]; then
            echo "Error: Files have changed after running 'npm run tsc'. Please run 'npm run tsc' locally and commit the changes."
            git status
            git diff
            exit 1
          fi

      - name: Setup config.json
        run: echo '{"token":"ci-token","port":"90","repo":"highcharts/highcharts","secureToken":"ci-secret","publicDownloaderTimeout":60000,"builderDownloaderTimeout":30000,"publicBuilderTimeout":90000}' > config.json

      - name: Run tests
        run: npm test

      - name: Run operations console integration tests
        run: npm run test:integration:ops

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run operations console browser tests
        run: npm run test:browser:ops
